services:
  orchestrator:
    build: .
    ports:
      - "8000:8000"
    environment:
      - WORKFLOWS_DIR=workflows
      - PYTHONPATH=/app
      # Credenciales Oracle Fusion (no rellenar aquí; usar .env o secretos)
      # - FUSION_BASE_URL=
      # - FUSION_USERNAME=
      # - FUSION_PASSWORD=
    volumes:
      - ./workflows:/app/workflows:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
